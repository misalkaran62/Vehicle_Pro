<div class="forger_main">
    <div class="forget_outer">
        <div class="forget_left">
            <div class="forget_text">
                <h1>Change Password</h1>
                <p>Enter the email address associated with your account, and we'll send you a link to reset your
                    password</p>
            </div>

            <form [formGroup]="changePasswordForm" (ngSubmit)="changepass()">
                <div class="fffmain">
                    <div class="forget_input">
                        <label for="email" class="label">Old Password</label><br>
                        <div class="changediv">
                            <input [type]="ispassvisible ?'text' : 'password'" formControlName="oldpass"
                                placeholder="Ex: Vehicle@123" class="f_input">
                            <i class="fa fa-eye" [ngClass]="ispassvisible ? 'fa-eye' : 'fa-eye-slash'"
                                (click)="passtoggle()"></i>

                        </div>
                        <div *ngIf="this.changePasswordForm.get('newpass')?.invalid && this.changePasswordForm.get('newpass')?.touched"
                            class="error">New Password is
                            required</div>
                    </div>





                    <div class="forget_input">
                        <label for="email" class="label">New Password</label><br>
                        <div class="changediv">
                            <input [type]="ispassvisible ?'text' : 'password'" formControlName="newpass"
                                placeholder="Ex: Vehicle@123" class="f_input">
                            <i class="fa fa-eye" [ngClass]="ispassvisible ? 'fa-eye' : 'fa-eye-slash'"
                                (click)="passtoggle()"></i>

                        </div>
                        <div *ngIf="this.changePasswordForm.get('newpass')?.invalid && this.changePasswordForm.get('newpass')?.touched"
                            class="error">New Password is
                            required</div>
                    </div>
                </div>

                <div class="forget_button">
                    <button type="submit" class="btn" [disabled]="changePasswordForm.invalid">Submit</button>
                </div>
            </form>
        </div>
        <div class="forget_right">
            <img src="../../assets/changepass.jpg" alt="Forgot password image">
        </div>
    </div>
</div>
