<div class="viewdocument" style="border: 2px solid red;">
  <div class="download-btn-container">
    <button  *ngIf="pdfType.type != 'application/pdf'" class="download-btn" (click)="downloadImage()">
      <i class="fas fa-download"></i>
    </button>
  </div>
  <iframe #iframe *ngIf="pdfUrl" [src]="pdfUrl | safe" width="100%" height="400">
  </iframe>
</div>
