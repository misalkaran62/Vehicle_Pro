<h1 mat-dialog-title class="header">Update Trip</h1>
<div mat-dialog-content class="form">
    <form [formGroup]="formGroup" (ngSubmit)="updateData()" enctype="multipart/form-data">

        <!-- Permit Form -->


        <mat-form-field appearance="outline">
            <mat-label>start Km</mat-label>
            <input matInput formControlName="startKm">
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>End km</mat-label>
            <input matInput formControlName="endKm">
        </mat-form-field>


        <div class="fileselector">
            <input type="file" id="startKm" (change)="onFileSelected($event, 'startKm')" multiple>
            <label class="fileBtn" for="startKm">
                <svg aria-hidden="true" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-width="2" stroke="#fffffff"
                        d="M13.5 3H12H8C6.34315 3 5 4.34315 5 6V18C5 19.6569 6.34315 21 8 21H11M13.5 3L19 8.625M13.5 3V7.625C13.5 8.17728 13.9477 8.625 14.5 8.625H19M19 8.625V11.8125"
                        stroke-linejoin="round" stroke-linecap="round"></path>
                    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="2" stroke="#fffffff"
                        d="M17 15V18M17 21V18M17 18H14M17 18H20"></path>
                </svg>


                {{
                isUpdate && !this.selectedFiles.startKm?.name
                ? formGroup.value.startKmPhotoName
                : (this.selectedFiles.startKm?.name || 'Select File')
                }}

            </label>

            <input type="file" id="EndKm" (change)="onFileSelected($event, 'EndKm')" multiple>
            <label class="fileBtn" for="EndKm">
                <svg aria-hidden="true" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-width="2" stroke="#fffffff"
                        d="M13.5 3H12H8C6.34315 3 5 4.34315 5 6V18C5 19.6569 6.34315 21 8 21H11M13.5 3L19 8.625M13.5 3V7.625C13.5 8.17728 13.9477 8.625 14.5 8.625H19M19 8.625V11.8125"
                        stroke-linejoin="round" stroke-linecap="round"></path>
                    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="2" stroke="#fffffff"
                        d="M17 15V18M17 21V18M17 18H14M17 18H20"></path>
                </svg>
                <span> {{
                    isUpdate && !this.selectedFiles.EndKm?.name
                    ? formGroup.value.endKmPhotoName
                    : (this.selectedFiles.EndKm?.name || 'Select File')
                    }}
                </span>



            </label>
        </div>





        <div mat-dialog-actions class="buttons">
            <button mat-button type="button" (click)="close('cancel')">Cancel</button>
            <button mat-button type="submit" style="margin-left: 20px;">Save</button>
        </div>

    </form>
</div>
